<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protected Course Notes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
        }
        .login-container h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .login-container p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .error-message {
            display: none;
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #c33;
        }
        .success-message {
            display: none;
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #3c3;
        }
        .note-list {
            display: none;
            margin-top: 30px;
        }
        .note-list h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .note-list ul {
            list-style: none;
        }
        .note-list li {
            margin-bottom: 12px;
        }
        .note-list a {
            display: inline-block;
            padding: 10px 16px;
            background: #f5f5f5;
            color: #667eea;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
            font-size: 14px;
            border-left: 3px solid #667eea;
        }
        .note-list a:hover {
            background: #667eea;
            color: white;
            border-left-color: white;
        }
        .logout-btn {
            margin-top: 20px;
            background: #999;
        }
        .logout-btn:hover {
            background: #777;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div id="login-form">
            <h1>📚 Course Notes</h1>
            <p>Enter your password to access the course materials</p>
            <div class="error-message" id="error-message"></div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" autocomplete="off">
            </div>
            <button onclick="authenticate()">Access Notes</button>
        </div>

        <div id="notes-content" class="note-list">
            <div class="success-message" id="success-message">✓ Access granted! Loading course materials...</div>
            <iframe id="notes-frame" style="width: 100%; height: calc(100vh - 100px); border: none; display: none;"></iframe>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        // Configuration: Update this with your course notes
        const COURSE_NOTES = {
            'mat-534': {
                title: 'MAT 534: Mathematics for Machine Learning',
                notes: [
                    { name: 'Course Notes (Main)', file: 'html-notes/index.html' },
                    { name: 'Converted Notes', file: 'html-notes/converted.html' },
                    { name: 'README', file: 'html-notes/README.md' }
                ]
            }
        };

        // IMPORTANT: Change this password hash
        // To generate a new hash: 
        // 1. Open browser console
        // 2. Run: btoa('your-password')
        // This is NOT secure for sensitive data, but adequate for GitHub Pages
        const PASSWORD_HASH = btoa('changeme'); // Default: "changeme"

        const BASE_PATH = './';  // Notes are in same directory

        function authenticate() {
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');
            
            if (btoa(password) === PASSWORD_HASH) {
                errorMsg.style.display = 'none';
                sessionStorage.setItem('authenticated', 'true');
                showNotesContent();
            } else {
                errorMsg.textContent = '❌ Incorrect password. Try again.';
                errorMsg.style.display = 'block';
            }
        }

        function showNotesContent() {
            // Redirect directly to index.html
            window.location.href = BASE_PATH + 'html-notes/index.html';
        }

        function logout() {
            sessionStorage.removeItem('authenticated');
            document.getElementById('password').value = '';
            document.getElementById('login-form').style.display = 'flex';
            document.getElementById('notes-content').style.display = 'none';
            document.getElementById('error-message').style.display = 'none';
        }

        // Check if already authenticated
        window.addEventListener('load', function() {
            if (sessionStorage.getItem('authenticated') === 'true') {
                showNotesContent();
            }
        });

        // Allow Enter key to submit
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') authenticate();
        });
    </script>
</body>
</html>
